[config]
default_to_workspace = false

[env]
RUSTY_CASTLE_IMAGE = "rusty-castle:latest"

[tasks.fmt]
description = "Format all Rust sources."
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check]
description = "Check Rust formatting without modifying files."
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.clippy]
description = "Run clippy for all workspace targets and features."
command = "cargo"
args = [
    "clippy",
    "--workspace",
    "--all-targets",
    "--all-features",
    "--",
    "-D",
    "warnings",
]

[tasks.test]
description = "Run all workspace tests with all features enabled."
command = "cargo"
args = ["test", "--workspace", "--all-features"]

[tasks.test-media-http-no-default-features]
description = "Check media-http with default features disabled."
command = "cargo"
args = ["test", "-p", "media-http", "--no-default-features"]

[tasks.test-upnp-core-no-default-features]
description = "Check upnp-core with default features disabled."
command = "cargo"
args = ["test", "-p", "upnp-core", "--no-default-features"]

[tasks.test-dlna-core-no-default-features]
description = "Check dlna-core with default features disabled."
command = "cargo"
args = ["test", "-p", "dlna-core", "--no-default-features"]

[tasks.test-upnp-av-core-no-default-features]
description = "Check upnp-av-core with default features disabled."
command = "cargo"
args = ["test", "-p", "upnp-av-core", "--no-default-features"]

[tasks.test-no-default-features]
description = "Run no-default-features checks for no_std-oriented crates."
dependencies = [
    "test-media-http-no-default-features",
    "test-upnp-core-no-default-features",
    "test-dlna-core-no-default-features",
    "test-upnp-av-core-no-default-features",
]

[tasks.bench]
description = "Run lightweight cargo bench measurements."
dependencies = [
    "bench-ssdp-parse",
    "bench-media-http-range",
]

[tasks.bench-ssdp-parse]
description = "Benchmark SSDP datagram parsing."
command = "cargo"
args = ["bench", "-p", "ssdp-core", "--bench", "parse"]

[tasks.bench-media-http-range]
description = "Benchmark HTTP range parsing and response planning."
command = "cargo"
args = ["bench", "-p", "media-http", "--bench", "range"]

[tasks.ci]
description = "Run the same checks used by GitHub Actions."
dependencies = [
    "fmt-check",
    "clippy",
    "test",
    "test-no-default-features",
]

[tasks.docker-image]
description = "Build the rusty-castle Docker image."
script = '''
set -eu
version="$(scripts/version.sh cargo)"
revision="$(scripts/version.sh revision)"
image="${RUSTY_CASTLE_IMAGE}"
if [ "$image" = "rusty-castle:latest" ]; then
    image="rusty-castle:$(scripts/version.sh docker)"
fi
docker build \
    --build-arg "RUSTY_CASTLE_VERSION=${version}" \
    --build-arg "RUSTY_CASTLE_REVISION=${revision}" \
    -t "${image}" \
    .
'''

[tasks.docker-build]
description = "Alias for docker-image."
alias = "docker-image"
